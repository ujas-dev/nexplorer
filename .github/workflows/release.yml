# NexPlorer — Automated Cross-Platform Build + Release
# =====================================================
# APPROACH: pip install nuitka (stable PyPI) + run directly
# WHY: Nuitka-Action@main tries "git checkout latest" which FAILS
#      because there is no branch named "latest" in Nuitka's repo.
#      Direct pip install from PyPI always works.
#
# USAGE:
#   GitHub → Releases → "Draft a new release" → tag v1.0.0 → Publish
#   ~20 min → 3 portable executables appear in the Release assets.
#   100% free on public repos.

name: Build & Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# WINDOWS BUILD
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install UPX
        run: choco install upx -y --no-progress
        continue-on-error: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nuitka ordered-set
          python -m pip install customtkinter
          python -m pip install zstandard lz4 brotli py7zr
          python -m pip install Pillow imagehash piexif
          python -m pip install watchdog psutil cryptography
          python -m pip install PyYAML schedule

      - name: Install optional dependencies
        run: |
          python -m pip install pymupdf || echo "pymupdf skipped"
          python -m pip install mutagen || echo "mutagen skipped"
          python -m pip install blake3  || echo "blake3 skipped"
        continue-on-error: true

      - name: Compile with Nuitka
        run: python -m nuitka --output-filename=NexPlorer nexplorer/__main__.py

      - name: Rename output
        shell: bash
        run: |
          ls -la dist/
          cp dist/NexPlorer.exe NexPlorer-windows-x86_64.exe ||           cp "$(find dist/ -name '*.exe' | head -1)" NexPlorer-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlorer-windows-x86_64
          path: NexPlorer-windows-x86_64.exe

# ─────────────────────────────────────────────────────────────────────────────
# LINUX BUILD
# ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends             gcc g++ patchelf upx-ucl             python3-dev python3-tk tk-dev             libx11-dev libxft-dev libxext-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nuitka ordered-set
          python -m pip install customtkinter
          python -m pip install zstandard lz4 brotli py7zr
          python -m pip install Pillow imagehash piexif
          python -m pip install watchdog psutil cryptography
          python -m pip install PyYAML schedule

      - name: Install optional dependencies
        run: |
          python -m pip install pymupdf || echo "pymupdf skipped"
          python -m pip install mutagen || echo "mutagen skipped"
          python -m pip install blake3  || echo "blake3 skipped"
        continue-on-error: true

      - name: Compile with Nuitka
        run: python -m nuitka --output-filename=NexPlorer nexplorer/__main__.py

      - name: Rename output
        run: |
          ls -la dist/
          cp dist/NexPlorer NexPlorer-linux-x86_64 ||           cp "$(find dist/ -type f ! -name '*.py' | head -1)" NexPlorer-linux-x86_64
          chmod +x NexPlorer-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlorer-linux-x86_64
          path: NexPlorer-linux-x86_64

# ─────────────────────────────────────────────────────────────────────────────
# MACOS BUILD
# ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          brew install upx || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nuitka ordered-set
          python -m pip install customtkinter
          python -m pip install zstandard lz4 brotli py7zr
          python -m pip install Pillow imagehash piexif
          python -m pip install watchdog psutil cryptography
          python -m pip install PyYAML schedule

      - name: Install optional dependencies
        run: |
          python -m pip install pymupdf || echo "pymupdf skipped"
          python -m pip install mutagen || echo "mutagen skipped"
          python -m pip install blake3  || echo "blake3 skipped"
        continue-on-error: true

      - name: Compile with Nuitka
        run: python -m nuitka --output-filename=NexPlorer nexplorer/__main__.py
      - name: Rename output
        run: |
          ls -la dist/
          cp dist/NexPlorer NexPlorer-macos-x86_64 ||           cp "$(find dist/ -type f ! -name '*.py' | head -1)" NexPlorer-macos-x86_64
          chmod +x NexPlorer-macos-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlorer-macos-x86_64
          path: NexPlorer-macos-x86_64

# ─────────────────────────────────────────────────────────────────────────────
# ATTACH ALL 3 TO GITHUB RELEASE
# ─────────────────────────────────────────────────────────────────────────────
  attach-to-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List downloaded files
        run: find artifacts/ -type f -ls

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/NexPlorer-windows-x86_64/NexPlorer-windows-x86_64.exe
            artifacts/NexPlorer-linux-x86_64/NexPlorer-linux-x86_64
            artifacts/NexPlorer-macos-x86_64/NexPlorer-macos-x86_64
          fail_on_unmatched_files: false
