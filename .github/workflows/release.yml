name: Build & Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install UPX
        run: choco install upx -y --no-progress
        continue-on-error: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nuitka ordered-set
          python -m pip install customtkinter
          python -m pip install zstandard lz4 brotli py7zr
          python -m pip install Pillow imagehash piexif
          python -m pip install watchdog psutil cryptography
          python -m pip install PyYAML schedule

      - name: Install optional dependencies
        run: |
          python -m pip install pymupdf || echo "pymupdf skipped"
          python -m pip install mutagen || echo "mutagen skipped"
          python -m pip install blake3  || echo "blake3 skipped"
        continue-on-error: true

      - name: Ensure dist folder exists
        run: mkdir -p dist
        shell: bash

      - name: Compile with Nuitka
        shell: bash
        run: |
          python -m nuitka             --onefile             --assume-yes-for-downloads             --output-dir=dist             --output-filename=NexPlorer.exe             --windows-disable-console             --python-flag=-m             --enable-plugin=tk-inter             --include-package=nexplorer             --include-package=customtkinter             --include-package=PIL             --include-package=cryptography             --include-package=zstandard             --include-package=lz4             --include-package=brotli             --include-package=py7zr             --include-package=psutil             --include-package=watchdog             --include-package=piexif             --include-package=imagehash             --include-package=yaml             --nofollow-import-to=boto3             --nofollow-import-to=botocore             --nofollow-import-to=numpy             --nofollow-import-to=pandas             --nofollow-import-to=matplotlib             --nofollow-import-to=IPython             --nofollow-import-to=sklearn             --nofollow-import-to=tensorflow             --nofollow-import-to=torch             --nofollow-import-to=docx             --nofollow-import-to=openpyxl             --nofollow-import-to=pptx             --nofollow-import-to=unittest             --nofollow-import-to=distutils             --nofollow-import-to=setuptools             nexplorer

      - name: Find and rename binary
        shell: bash
        run: |
          echo "=== CWD contents ==="
          ls -la
          echo "=== dist/ contents ==="
          ls -la dist/ 2>/dev/null || echo "dist/ empty"
          # Look everywhere Nuitka might have put it
          EXE=$(find . -maxdepth 3 -name "NexPlorer.exe" | head -1)
          echo "Found: $EXE"
          cp "$EXE" NexPlorer-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: NexPlorer-windows-x86_64
          path: NexPlorer-windows-x86_64.exe

# ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends             gcc g++ patchelf upx-ucl             python3-dev python3-tk tk-dev             libx11-dev libxft-dev libxext-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nuitka ordered-set
          python -m pip install customtkinter
          python -m pip install zstandard lz4 brotli py7zr
          python -m pip install Pillow imagehash piexif
          python -m pip install watchdog psutil cryptography
          python -m pip install PyYAML schedule

      - name: Install optional dependencies
        run: |
          python -m pip install pymupdf || echo "pymupdf skipped"
          python -m pip install mutagen || echo "mutagen skipped"
          python -m pip install blake3  || echo "blake3 skipped"
        continue-on-error: true

      - name: Ensure dist folder exists
        run: mkdir -p dist

      - name: Compile with Nuitka
        run: |
          python -m nuitka             --onefile             --assume-yes-for-downloads             --output-dir=dist             --output-filename=NexPlorer.bin             --python-flag=-m             --enable-plugin=tk-inter             --include-package=nexplorer             --include-package=customtkinter             --include-package=PIL             --include-package=cryptography             --include-package=zstandard             --include-package=lz4             --include-package=brotli             --include-package=py7zr             --include-package=psutil             --include-package=watchdog             --include-package=piexif             --include-package=imagehash             --include-package=yaml             --nofollow-import-to=boto3             --nofollow-import-to=botocore             --nofollow-import-to=numpy             --nofollow-import-to=pandas             --nofollow-import-to=matplotlib             --nofollow-import-to=IPython             --nofollow-import-to=sklearn             --nofollow-import-to=tensorflow             --nofollow-import-to=torch             --nofollow-import-to=docx             --nofollow-import-to=openpyxl             --nofollow-import-to=pptx             --nofollow-import-to=unittest             --nofollow-import-to=distutils             --nofollow-import-to=setuptools             nexplorer

      - name: Find and rename binary
        run: |
          echo "=== CWD contents ==="
          ls -la
          echo "=== dist/ contents ==="
          ls -la dist/ 2>/dev/null || echo "dist/ empty"
          BIN=$(find . -maxdepth 3 -name "NexPlorer.bin" | head -1)
          echo "Found: $BIN"
          cp "$BIN" NexPlorer-linux-x86_64
          chmod +x NexPlorer-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: NexPlorer-linux-x86_64
          path: NexPlorer-linux-x86_64

# ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: brew install upx || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nuitka ordered-set
          python -m pip install customtkinter
          python -m pip install zstandard lz4 brotli py7zr
          python -m pip install Pillow imagehash piexif
          python -m pip install watchdog psutil cryptography
          python -m pip install PyYAML schedule

      - name: Install optional dependencies
        run: |
          python -m pip install pymupdf || echo "pymupdf skipped"
          python -m pip install mutagen || echo "mutagen skipped"
          python -m pip install blake3  || echo "blake3 skipped"
        continue-on-error: true

      - name: Ensure dist folder exists
        run: mkdir -p dist

      - name: Compile with Nuitka
        run: |
          python -m nuitka             --onefile             --assume-yes-for-downloads             --output-dir=dist             --output-filename=NexPlorer.bin             --python-flag=-m             --enable-plugin=tk-inter             --include-package=nexplorer             --include-package=customtkinter             --include-package=PIL             --include-package=cryptography             --include-package=zstandard             --include-package=lz4             --include-package=brotli             --include-package=py7zr             --include-package=psutil             --include-package=watchdog             --include-package=piexif             --include-package=imagehash             --include-package=yaml             --nofollow-import-to=boto3             --nofollow-import-to=botocore             --nofollow-import-to=numpy             --nofollow-import-to=pandas             --nofollow-import-to=matplotlib             --nofollow-import-to=IPython             --nofollow-import-to=sklearn             --nofollow-import-to=tensorflow             --nofollow-import-to=torch             --nofollow-import-to=docx             --nofollow-import-to=openpyxl             --nofollow-import-to=pptx             --nofollow-import-to=unittest             --nofollow-import-to=distutils             --nofollow-import-to=setuptools             nexplorer

      - name: Find and rename binary
        run: |
          echo "=== CWD contents ==="
          ls -la
          echo "=== dist/ contents ==="
          ls -la dist/ 2>/dev/null || echo "dist/ empty"
          BIN=$(find . -maxdepth 3 -name "NexPlorer.bin" | head -1)
          echo "Found: $BIN"
          cp "$BIN" NexPlorer-macos-arm64
          chmod +x NexPlorer-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: NexPlorer-macos-arm64
          path: NexPlorer-macos-arm64

# ─────────────────────────────────────────────────────────────────────────────
  attach-to-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f -ls

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/NexPlorer-windows-x86_64/NexPlorer-windows-x86_64.exe
            artifacts/NexPlorer-linux-x86_64/NexPlorer-linux-x86_64
            artifacts/NexPlorer-macos-arm64/NexPlorer-macos-arm64
          fail_on_unmatched_files: false
