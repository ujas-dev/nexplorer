# NexPlorer — Automated Cross-Platform Build + Release
# =====================================================
# FIXED: All known Nuitka-Action parameter issues
# - Correct enable-plugins format (comma-separated, not multiline)
# - Correct include-package format  
# - Correct nofollow-import-to format
# - Icon only on Windows (file must exist)
# - Output path handling fixed
# - onefile mode correct syntax
#
# HOW TO USE:
#   Go to GitHub repo → Releases → "Draft a new release"
#   → Create tag v1.0.0 → Publish Release
#   → This workflow triggers → ~20 min → executables appear in Release
#
# FREE: Public repos have unlimited GitHub Actions minutes

name: Build & Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # BUILD WINDOWS
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install UPX
        run: choco install upx -y --no-progress
        continue-on-error: true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install customtkinter
          pip install blake3 || pip install hashlib
          pip install zstandard lz4 brotli py7zr
          pip install Pillow imagehash piexif
          pip install watchdog psutil cryptography
          pip install PyYAML schedule

      - name: Install optional dependencies
        run: |
          pip install pymupdf || echo "pymupdf skipped"
          pip install mutagen || echo "mutagen skipped"
        continue-on-error: true

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: latest
          script-name: nexplorer/__main__.py
          mode: onefile
          output-dir: dist
          output-filename: NexPlorer
          windows-disable-console: true
          enable-plugins: tk-inter,upx
          include-package: nexplorer,customtkinter,PIL,cryptography,zstandard,lz4,brotli,py7zr,psutil,watchdog,piexif,imagehash,yaml
          include-data-dir: nexplorer/assets=nexplorer/assets
          nofollow-import-to: boto3,botocore,google,dropbox,numpy,pandas,scipy,matplotlib,IPython,jupyter,sklearn,tensorflow,torch,docx,openpyxl,pptx,unittest,doctest,pdb,pydoc,distutils,setuptools,pkg_resources

      - name: Locate and rename output
        shell: bash
        run: |
          echo "Contents of dist/:"
          find dist/ -type f || echo "dist/ empty or missing"
          # Nuitka-Action output can be .exe or inside a subfolder
          EXE=$(find dist/ -name "*.exe" | head -1)
          if [ -z "$EXE" ]; then
            EXE=$(find . -name "NexPlorer.exe" | head -1)
          fi
          echo "Found: $EXE"
          cp "$EXE" NexPlorer-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: NexPlorer-windows-x86_64
          path: NexPlorer-windows-x86_64.exe

  # ─────────────────────────────────────────────────────────────────────────
  # BUILD LINUX
  # ─────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends             gcc g++ patchelf upx-ucl             python3-dev python3-tk tk-dev             libx11-dev libxft-dev libxext-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install customtkinter
          pip install zstandard lz4 brotli py7zr
          pip install Pillow imagehash piexif
          pip install watchdog psutil cryptography
          pip install PyYAML schedule

      - name: Install optional dependencies
        run: |
          pip install pymupdf || echo "pymupdf skipped"
          pip install mutagen || echo "mutagen skipped"
          pip install blake3  || echo "blake3 skipped"
        continue-on-error: true

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: latest
          script-name: nexplorer/__main__.py
          mode: onefile
          output-dir: dist
          output-filename: NexPlorer
          enable-plugins: tk-inter,upx
          include-package: nexplorer,customtkinter,PIL,cryptography,zstandard,lz4,brotli,py7zr,psutil,watchdog,piexif,imagehash,yaml
          include-data-dir: nexplorer/assets=nexplorer/assets
          nofollow-import-to: boto3,botocore,google,dropbox,numpy,pandas,scipy,matplotlib,IPython,jupyter,sklearn,tensorflow,torch,docx,openpyxl,pptx,unittest,doctest,pdb,pydoc,distutils,setuptools,pkg_resources

      - name: Locate and rename output
        run: |
          echo "Contents of dist/:"
          find dist/ -type f || echo "dist/ empty"
          BIN=$(find dist/ -type f -not -name "*.py" | head -1)
          if [ -z "$BIN" ]; then
            BIN=$(find . -name "NexPlorer.bin" -o -name "NexPlorer" | grep -v ".py" | head -1)
          fi
          echo "Found: $BIN"
          cp "$BIN" NexPlorer-linux-x86_64
          chmod +x NexPlorer-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: NexPlorer-linux-x86_64
          path: NexPlorer-linux-x86_64

  # ─────────────────────────────────────────────────────────────────────────
  # BUILD MACOS
  # ─────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          brew install upx || true
          # Ensure tkinter available for this Python
          brew install python-tk@3.11 || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install customtkinter
          pip install zstandard lz4 brotli py7zr
          pip install Pillow imagehash piexif
          pip install watchdog psutil cryptography
          pip install PyYAML schedule

      - name: Install optional dependencies
        run: |
          pip install pymupdf || echo "pymupdf skipped"
          pip install mutagen || echo "mutagen skipped"
          pip install blake3  || echo "blake3 skipped"
        continue-on-error: true

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: latest
          script-name: nexplorer/__main__.py
          mode: onefile
          output-dir: dist
          output-filename: NexPlorer
          enable-plugins: tk-inter,upx
          include-package: nexplorer,customtkinter,PIL,cryptography,zstandard,lz4,brotli,py7zr,psutil,watchdog,piexif,imagehash,yaml
          include-data-dir: nexplorer/assets=nexplorer/assets
          nofollow-import-to: boto3,botocore,google,dropbox,numpy,pandas,scipy,matplotlib,IPython,jupyter,sklearn,tensorflow,torch,docx,openpyxl,pptx,unittest,doctest,pdb,pydoc,distutils,setuptools,pkg_resources

      - name: Locate and rename output
        run: |
          echo "Contents of dist/:"
          find dist/ -type f || echo "dist/ empty"
          BIN=$(find dist/ -type f -not -name "*.py" | head -1)
          if [ -z "$BIN" ]; then
            BIN=$(find . -name "NexPlorer.bin" -o -name "NexPlorer" | grep -v ".py" | head -1)
          fi
          echo "Found: $BIN"
          cp "$BIN" NexPlorer-macos-x86_64
          chmod +x NexPlorer-macos-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: NexPlorer-macos-x86_64
          path: NexPlorer-macos-x86_64

  # ─────────────────────────────────────────────────────────────────────────
  # ATTACH ALL 3 BINARIES TO GITHUB RELEASE
  # ─────────────────────────────────────────────────────────────────────────
  attach-to-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f -ls

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/NexPlorer-windows-x86_64/NexPlorer-windows-x86_64.exe
            artifacts/NexPlorer-linux-x86_64/NexPlorer-linux-x86_64
            artifacts/NexPlorer-macos-x86_64/NexPlorer-macos-x86_64
          fail_on_unmatched_files: false
